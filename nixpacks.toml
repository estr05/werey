# nixpacks.toml — Forzar detección de PHP en Railway
# El proyecto tiene composer.json (Laravel 12) + package.json (Vite),
# y Nixpacks a veces infiere Node.js en lugar de PHP.
# Este archivo fuerza el orden correcto de providers.

[phases.setup]
    providers = ["php", "nodejs"]

[phases.build]
    commands = [
        "npm install",
        "npm run build"
    ]

# Variables de entorno para el servidor web (necesarias para Laravel)
[environment]
    NIXPACKS_PHP_ROOT_DIR = "/app/public"
    NIXPACKS_PHP_FALLBACK_PATH = "/index.php"
